name: Security Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secrets_scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: block
          allowed-endpoints: >
            *.stepsecurity.io:443
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            files.pythonhosted.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: block
          allowed-endpoints: >
            *.stepsecurity.io:443
            files.pythonhosted.org:443
            github.com:443
            metrics.semgrep.dev:443
            pypi.org:443
            semgrep.dev:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Semgrep
        run: |
          pip install semgrep==1.96.0
          semgrep --config p/python src/ --config p/javascript --sarif --output semgrep-results.sarif || true

      - name: Upload Semgrep results to summary
        if: always()
        run: |
          echo "## 🔍 SAST — Semgrep Results" >> $GITHUB_STEP_SUMMARY
          echo "| File | Line | Rule | Severity |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|----------|" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, sys
          with open('semgrep-results.sarif') as f:
              data = json.load(f)
          results = data.get('runs', [{}])[0].get('results', [])
          if not results:
              print('| ✅ No findings | - | - | - |')
          else:
              for r in results:
                  loc = r.get('locations', [{}])[0].get('physicalLocation', {})
                  file = loc.get('artifactLocation', {}).get('uri', 'N/A')
                  line = loc.get('region', {}).get('startLine', 'N/A')
                  rule = r.get('ruleId', 'N/A')
                  level = r.get('level', 'N/A')
                  print(f'| {file} | {line} | {rule} | {level} |')
          " >> $GITHUB_STEP_SUMMARY

  image_scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            *.stepsecurity.io:443
            pypi.org:443
            files.pythonhosted.org:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            auth.docker.io:443
            raw.githubusercontent.com:443
            get.anchore.io:443  
            release-assets.githubusercontent.com:443
            grype.anchore.io:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Docker image
        run: docker build -t iam-audit:test .

      - name: Run Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: iam-audit:test
          fail-build: false
          output-format: table
          output-file: grype-results.txt

      - name: Upload Grype results to summary
        if: always()
        run: |
          echo "## 🐳 Image Scanning — Grype Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat grype-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  iac_scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: block
          allowed-endpoints: >
            *.stepsecurity.io:443
            api0.prismacloud.io:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            www.bridgecrew.cloud:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Checkov
        run: |
          pip install checkov==3.2.395
          checkov -d infra/ \
            --config-file infra/.checkov.yml \
            --soft-fail \
            --output github_failed_only \
            2>&1 | tee /tmp/checkov-results.txt || true

      - name: Upload Checkov results to summary
        if: always()
        run: |
          echo "## 🏗️ IaC Scanning — Checkov Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/checkov-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY